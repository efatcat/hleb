<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HLEB GAME — система ИИ-игр</title>
    <!-- Шрифт Unbounded -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: 'Unbounded', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #f0f3f8;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* анимированный градиентный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #0f1219, #030507);
        }

        /* эффект сетки */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(60, 80, 120, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 80, 120, 0.08) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
            position: relative;
            z-index: 2;
        }

        /* анимация появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 5px rgba(255,215,0,0.3); }
            100% { text-shadow: 0 0 20px rgba(255,215,0,0.7); }
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* SVG стилизация */
        .logo-svg {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(218, 165, 32, 0.6));
            transition: transform 0.3s ease, filter 0.3s;
            margin-bottom: 1.2rem;
        }

        .logo-svg:hover {
            transform: scale(1.03);
            filter: drop-shadow(0 0 22px rgba(218, 165, 32, 0.9));
        }

        .logo-svg svg {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: clamp(2.6rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFF6E0, #E4B363);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            animation: glowPulse 2s infinite alternate;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 400;
            color: #b9c7d9;
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(228, 179, 99, 0.3);
            letter-spacing: 0.3px;
        }

        /* разделы */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1.2rem;
            letter-spacing: -0.3px;
            color: #e4b363;
            border-left: 3px solid #e4b363;
            padding-left: 1rem;
        }

        /* карточки игр */
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0 1rem;
        }

        .game-card {
            background: rgba(18, 22, 32, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(228, 179, 99, 0.25);
            padding: 1.5rem 1.5rem 1.8rem;
            width: 260px;
            text-align: center;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            cursor: pointer;
            animation: fadeInUp 0.7s ease backwards;
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(228, 179, 99, 0.7);
            background: rgba(25, 30, 42, 0.85);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.6);
        }

        /* изображение игры */
        .game-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 1.2rem;
            overflow: hidden;
            margin-bottom: 1rem;
            background: #0f121b;
        }

        .game-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .game-card:hover .game-image img {
            transform: scale(1.02);
        }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: none; /* скрываем иконку, показываем картинку */
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(120deg, #f3e5c0, #e4b363);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
        }

        .author-block {
            margin: 0.4rem 0 1rem;
            font-size: 0.7rem;
            color: #b1c2d8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .author-name {
            font-weight: 600;
            color: #e4b363;
            background: rgba(228, 179, 99, 0.12);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-block;
            font-size: 0.65rem;
            text-decoration: none;
            border: 0.5px solid rgba(228,179,99,0.3);
        }

        .author-name:hover {
            background: #e4b363;
            color: #0a0c14;
            box-shadow: 0 0 8px rgba(228,179,99,0.6);
        }

        .game-link {
            display: inline-block;
            background: rgba(228, 179, 99, 0.12);
            border: 1px solid rgba(228, 179, 99, 0.5);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #f5e2b0;
            font-weight: 500;
            font-size: 0.75rem;
            transition: all 0.25s;
        }

        .game-link:hover {
            background: #e4b363;
            color: #0a0c10;
            border-color: #e4b363;
            box-shadow: 0 0 12px rgba(228,179,99,0.5);
        }

        /* блок рекомендаций (случайные игры) */
        .recommendations-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0 1.5rem;
        }

        .rec-card {
            background: rgba(18, 22, 32, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(228, 179, 99, 0.2);
            padding: 1rem;
            width: 200px;
            text-align: center;
            transition: all 0.25s;
            cursor: pointer;
        }

        .rec-card:hover {
            border-color: rgba(228, 179, 99, 0.6);
            background: rgba(25, 30, 42, 0.7);
            transform: translateY(-4px);
        }

        .rec-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 0.6rem;
            background: #0f121b;
        }

        .rec-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rec-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #f3e5c0;
        }

        /* Google форма */
        .google-form-block {
            margin: 2rem auto 1rem;
            max-width: 600px;
            background: rgba(18, 22, 32, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(228, 179, 99, 0.3);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            text-align: center;
        }

        .form-text {
            font-size: 0.85rem;
            color: #cfdef5;
            font-weight: 500;
        }

        .form-link {
            background: rgba(228, 179, 99, 0.12);
            border: 1px solid rgba(228, 179, 99, 0.5);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #f5e2b0;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.25s;
        }

        .form-link:hover {
            background: #e4b363;
            color: #0a0c10;
            border-color: #e4b363;
            box-shadow: 0 0 12px rgba(228,179,99,0.5);
        }

        .glow-spot {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(228,179,99,0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            top: -20%;
            right: -20%;
        }

        .glow-spot-2 {
            bottom: -30%;
            left: -20%;
            background: radial-gradient(circle, rgba(80,120,200,0.06) 0%, rgba(0,0,0,0) 70%);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #5f6e85;
            border-top: 1px solid rgba(228,179,99,0.2);
            padding-top: 2rem;
        }

        @media (max-width: 650px) {
            .container {
                padding: 2rem 1.2rem;
            }
            .game-card, .rec-card {
                width: 100%;
                max-width: 260px;
            }
            .logo-svg {
                width: 100px;
            }
        }
    </style>
</head>

<script>
    (function() {
        // База всех игр (для рекомендаций)
        const gamesLibrary = [
            {
                title: "Kolblocks",
                url: "https://efatcat.github.io/kolblocks",
                authorPage: "https://efatcat.github.io/h/avtor/hleb-game-off",
                image: "https://i.oneme.ru/i?r=BTE2sh_eZW7g8kugOdIm2NotCTNzdENykHI__Mau_7PpqDL_i6iagkBC3ooC5OrownA",
                fallbackIcon: "🟦"
            },
            {
                title: "Buy Things",
                url: "https://efatcat.github.io/TheThingGame",
                authorPage: "https://efatcat.github.io/h/avtor/hleb-game-off",
                image: null, // используем эмодзи-заглушку
                fallbackIcon: "💰"
            }
        ];

        // Функция для получения случайных игр (до 3, но у нас всего 2)
        function getRandomGames(arr, count = 2) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, Math.min(count, arr.length));
        }

        // Отрисовка рекомендаций
        const recGrid = document.getElementById('recGrid');
        if (recGrid) {
            const randomGames = getRandomGames(gamesLibrary, 3);
            randomGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'rec-card';
                card.setAttribute('data-game-url', game.url);
                
                const imgDiv = document.createElement('div');
                imgDiv.className = 'rec-image';
                if (game.image) {
                    const img = document.createElement('img');
                    img.src = game.image;
                    img.alt = game.title;
                    img.onerror = function() { this.style.display = 'none'; this.parentElement.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:2.5rem;">${game.fallbackIcon}</div>`; };
                    imgDiv.appendChild(img);
                } else {
                    imgDiv.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:2.5rem;">${game.fallbackIcon}</div>`;
                }
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'rec-title';
                titleDiv.textContent = game.title;
                
                card.appendChild(imgDiv);
                card.appendChild(titleDiv);
                
                // Клик по рекомендации — открытие игры
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.open(game.url, '_blank', 'noopener,noreferrer');
                });
                
                recGrid.appendChild(card);
            });
        }

        // Клик по автору в основных карточках
        const authorSpans = document.querySelectorAll('.author-name');
        authorSpans.forEach(authorSpan => {
            authorSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                const authorUrl = authorSpan.getAttribute('data-author-page');
                if (authorUrl) window.location.href = authorUrl;
            });
        });

        // Клик по карточке (не по кнопке, не по автору)
        const gameCards = document.querySelectorAll('.game-card');
        gameCards.forEach(card => {
            const playBtn = card.querySelector('.game-link');
            let gameUrl = playBtn ? playBtn.getAttribute('href') : null;
            if (!gameUrl && card.hasAttribute('data-game-url')) {
                gameUrl = card.getAttribute('data-game-url');
            }
            card.addEventListener('click', (e) => {
                if (e.target.closest('.game-link')) return;
                if (e.target.closest('.author-name')) return;
                if (gameUrl) window.open(gameUrl, '_blank', 'noopener,noreferrer');
            });
        });

        // Эффект слежения за мышью
        const glowSpot = document.querySelector('.glow-spot');
        if (glowSpot) {
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                glowSpot.style.transform = `translate(${x * 30}px, ${y * 20}px)`;
            });
        }
    })();
</script>
</body>
</html>
